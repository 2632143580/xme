services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: companion_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:latest
    container_name: companion_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/test1234
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./data/neo4j_data:/data
    restart: unless-stopped